name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npm run rebuild:native

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build -- --publish never

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dev-desk-windows
          path: release/**/*.exe

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path release -Recurse -Filter "*.exe" |
            Where-Object { $_.Name -notlike "__uninstaller*" } |
            Select-Object -First 1

          if (-not $installer) {
            throw "No installer exe found under release/"
          }

          gh release create $env:GITHUB_REF_NAME $installer.FullName `
            --title $env:GITHUB_REF_NAME `
            --notes "Dev Desk $env:GITHUB_REF_NAME"
